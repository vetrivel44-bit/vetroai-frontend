    img.onload = () => {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      
      // Cream background color
      const targetR = 245;
      const targetG = 245;
      const targetB = 235;
      const threshold = 40;
      
      let minX = canvas.width;
      let maxX = 0;
      let minY = canvas.height;
      let maxY = 0;
      
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        // Calculate Euclidean distance to cream color
        const dist = Math.sqrt((r - targetR)**2 + (g - targetG)**2 + (b - targetB)**2);
        if (dist < threshold) {
          data[i+3] = 0; // Make transparent
        } else {
          // Track bounding box of non-transparent content
          const x = (i / 4) % canvas.width;
          const y = Math.floor((i / 4) / canvas.width);
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
      
      ctx.putImageData(imgData, 0, 0);
      
      // Crop to content bounding box
      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;
      
      if (cropW <= 0 || cropH <= 0) {
        document.getElementById('status').innerText = 'ERROR: Empty bounding box';
        return;
      }
      
      const cropCanvas = document.createElement('canvas');
      cropCanvas.width = cropW;
      cropCanvas.height = cropH;
      const cropCtx = cropCanvas.getContext('2d');
      cropCtx.drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
      
      const base64Str = cropCanvas.toDataURL('image/png').split(',')[1];
      
      // Clear body and write base64
      document.body.innerHTML = '<pre id="result">' + base64Str + '</pre>';
    };
  </script>
</body>
</html>
